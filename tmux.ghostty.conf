# Sourced only when tmux is running inside Ghostty (see tmux.conf.symlink).
#
# Prefix is remapped to C-Space so that C-b and C-s both pass through
# untouched to nested tmux sessions on remote hosts. Ghostty's Cmd
# shortcuts send `\x00` (C-Space) then the binding key — see ~/.config/ghostty/config.

unbind C-s
set -g prefix C-Space
bind C-Space send-prefix

# Cmd-9 (via Ghostty) jumps to the last window — overrides the default
# `prefix + 9 = window 9` to match browser-style "last tab" behavior.
bind 9 select-window -t :$

# Cmd-w (via Ghostty) closes the current window without tmux's confirm prompt.
bind & kill-window

# Cmd-t (via Ghostty) opens a new window at the end, like a browser tab.
bind c new-window -a -t '{end}'
bind C-c new-window -a -t '{end}'

# Cmd-Shift-, / Cmd-Shift-. (via Ghostty) move the current window left/right.
bind "<" swap-window -d -t -1
bind ">" swap-window -d -t +1

set-option -g status-position top

# Window title: use whatever the app sets via OSC (pane_title), falling
# back to the cwd basename when nothing has set a title yet.
setw -g automatic-rename-format '#{?#{!=:#{pane_title},},#{pane_title},#{b:pane_current_path}}'

# ---- browser-tab styling ----------------------------------------------------

set -g status-style "bg=#1a1b1e,fg=#8b8d94"
set -g status-left-length 30
set -g status-right ""
set -g status-justify left

set -g status-left "#[bg=#4c8eff,fg=#ffffff,bold] #S #[bg=#1a1b1e,fg=#4c8eff] "

# Inactive tab: blends with the bar, dim text
set -g window-status-format "#[bg=#1a1b1e,fg=#26272b]#[bg=#26272b,fg=#b8babf] #I  #W #[bg=#1a1b1e,fg=#26272b]"
set -g window-status-separator ""

# Active tab: raised look with rounded ends, like a Chrome tab
set -g window-status-current-format "#[bg=#1a1b1e,fg=#3a3b40]#[bg=#3a3b40,fg=#ffffff,bold] #I  #W #[bg=#1a1b1e,fg=#3a3b40]"

set -g window-status-activity-style "fg=#ffb454"
set -g window-status-bell-style "fg=#ff5c5c,bold"

# Get shift-enter working in claude
set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'
